# ────────────────────────────────────────────────────────────
# 初始馆藏卡牌定义
# 字段：
#   name (必填) · type (book/knowledge/tool/material/state/visitor/lead)
#   aspects: { aspect: 强度, ... }   # 详见 scripts/Core/Aspect.cs
#   condition: fragment/damaged/worn/good/pristine  (book only, 默认 good)
#   identified: true/false   (book only, 默认 true)
#   series / volume / series_total   (book only)
#   charges: 整数   (material only, 不写表示耐用品/tool)
#   description: 自由文本
# ────────────────────────────────────────────────────────────

